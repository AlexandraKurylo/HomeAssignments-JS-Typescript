<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Завдання 1</title>
    </head>
    <body>
        <div class="task-block" style="margin-bottom: 50px;">
            <h1>Задача 1</h1>
            <p>Генерація всіх підмножин: Реалізуйте рекурсивну функцію, яка
                генерує всі можливі підмножини заданого масиву. Наприклад, для
                масиву [1, 2, 3] можливі підмножини: [], [1], [2], [3], [1, 2],
                [1, 3], [2, 3], [1, 2, 3].
            </p>
        </div>

        <script>
            function startProcess() {
                const size = parseInt(prompt("Введіть розмір масиву:"));
                if (isNaN(size) || size < 0) {
                    alert("Введіть коректне число");
                    return;
                }

                const baseArray = Array.from({ length: size }, (_, i) => i + 1);

                document.write(`<h3>Початковий масив: [ ${baseArray.join(", ")} ]</h3>`);
                const allSubsets = generateSubsets(baseArray);
                displayResults(allSubsets);
            }

            // Перший спосіб - один масив з додаванням/видаленням (без створення нового масиву на кожному кроці)
            function generateSubsets(arr) {
                const result = [];
                function backtrack(index, currentSubset) {
                    if (index === arr.length) {
                        result.push([...currentSubset]);
                        return;
                    }

                    currentSubset.push(arr[index]);
                    backtrack(index + 1, currentSubset);

                    currentSubset.pop();
                    backtrack(index + 1, currentSubset);
                }

                backtrack(0, []);
                return result.sort((a, b) => a.length - b.length);
            }


            function displayResults(subsets) {
                document.write("<h4>Згенеровані підмножини:</h4>");
                
                subsets.forEach(subset => {
                    document.write(`[ ${subset.join(", ")} ]<br>`);
                });

                document.write(`<br><b>Всього знайдено підмножин: ${subsets.length}</b>`);
            }
            if (confirm('Почати тестування?')) {
                startProcess();
            }

            /* -------------------------------------------------------------------------
            Друий спосіб - (Створення нового масиву на кожному кроці)

            function generateSubsetsAlternative(arr) {
                const result = [];

                function recurse(index, currentSubset) {
                    if (index === arr.length) {
                        result.push(currentSubset);
                        return;
                    }
                    recurse(index + 1, currentSubset);
                    recurse(index + 1, [...currentSubset, arr[index]]);
                }

                recurse(0, []);
                return result.sort((a, b) => a.length - b.length);
            }
            */
        </script>
    </body>
</html>
