<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/reset.css">
        <title>Задача 4 - Контроль успішності учня</title>
        <style>
            .academic-panel {
                font-family: 'Montserrat', sans-serif;
                background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
                color: #f1f5f9;

            }  

            .academic-panel__container {
                max-width: 1240px;
                min-height: 100vh;
                display: flex;
                margin: 0 auto;
                justify-content: center;
                align-items: center;
                padding: 40px 20px;
            }


            .academic-panel__app {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 24px;
                padding: 35px;
                width: 100%;
                max-width: 500px;
                box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
            }

            .academic-panel__title {
                font-size: 20px;
                font-weight: 800;
                color: #38bdf8;
                text-align: center;
                margin-bottom: 25px;
            }

            .academic-panel__error-message {
                background: rgba(239, 68, 68, 0.15);
                border: 1px solid #ef4444;
                color: #fca5a5;
                border-radius: 12px;
                padding: 12px 16px;
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 20px;
                display: none;
            }

            .academic-form {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .academic-form__group {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .academic-form__label {
                font-size: 14px;
                font-weight: 700;
                color: #94a3b8;
            }

            .academic-form__input {
                background: #0f172a;
                border: 2px solid #334155;
                border-radius: 10px;
                padding: 12px 16px;
                font-family: inherit;
                font-size: 15px;
                color: #ffffff;
                outline: none;
                transition: border-color 0.2s ease;
            }

            .academic-form__input:focus {
                border-color: #38bdf8;
            }

            .academic-form__button {
                background: #38bdf8;
                color: #0f172a;
                border: none;
                border-radius: 10px;
                padding: 14px;
                font-family: inherit;
                font-size: 15px;
                font-weight: 700;
                cursor: pointer;
                transition: background-color 0.2s ease;
                margin-top: 10px;
            }

            .academic-form__button:hover {
                background: #0ea5e9;
            }

            .academic-result {
                margin-top: 25px;
                padding: 16px;
                border-radius: 12px;
                font-size: 15px;
                font-weight: 700;
                text-align: center;
                display: none;
            }

            .academic-result--success {
                background: rgba(34, 197, 94, 0.15);
                border: 1px solid #22c55e;
                color: #4ade80;
            }

            .academic-result--info {
                background: rgba(56, 189, 248, 0.15);
                border: 1px solid #38bdf8;
                color: #38bdf8;
            }

            .academic-result--danger {
                background: rgba(239, 68, 68, 0.15);
                border: 1px solid #ef4444;
                color: #fca5a5;
            }
        </style>
    </head>
    <body>

        <div class="academic-panel">
            <div class="academic-panel__container">
                <div class="academic-panel__app">
                    <h2 class="academic-panel__title">📊 Контроль успішності
                        учня</h2>
                    <div class="academic-panel__error-message"
                        id="errorBlock"></div>
                    <div id="academicAppContainer"></div>
                </div>
            </div>
        </div>

        <script>
        // Базовий клас помилки валідації даних
        class ValidationError extends Error {
            constructor(message) {
                super(message);
                this.name = "ValidationError";
            }
        }

        // Клас помилок, пов'язаних з місяцями навчання
        class MonthValidationError extends ValidationError {
            constructor(message) {
                super(message);
                this.name = "MonthValidationError";
            }
        }

        // Клас помилок, пов'язаних з оцінками
        class GradeValidationError extends ValidationError {
            constructor(message) {
                super(message);
                this.name = "GradeValidationError";
            }
        }


        class AcademicManager {
            constructor() {
                // Константи для логіки додатку
                this.SUMMER_VACATION_MONTHS = [6, 7, 8];
                this.END_OF_SEMESTER_MONTHS = [5, 12]; // Травень та Грудень
                this.BAD_GRADE_THRESHOLD = 60; // Все що нижче 60 — погана оцінка
            }

            // Метод валідації місяця навчання
            validateMonth(monthValue) {
                const trimmed = monthValue.trim();
                
                if (trimmed === '') {
                    throw new MonthValidationError("Помилка: Поле місяця не може бути порожнім.");
                }

                const month = Number(trimmed);
                
                if (isNaN(month)) {
                    throw new MonthValidationError(`Помилка: Місяць має бути числом. Ви ввели: "${trimmed}"`);
                }

                if (month < 1 || month > 12 || month % 1 !== 0) {
                    throw new MonthValidationError(`Помилка: Номер місяця має бути цілим числом від 1 до 12. Ви ввели: ${month}`);
                }

                if (this.SUMMER_VACATION_MONTHS.includes(month)) {
                    throw new MonthValidationError(`Помилка: Місяць №${month} — це літні канікули! Навчання не проводиться.`);
                }

                return month;
            }

            // Метод валідації оцінки
            validateGrade(gradeValue) {
                const trimmed = gradeValue.trim();

                if (trimmed === '') {
                    throw new GradeValidationError("Помилка: Поле оцінки не може бути порожнім.");
                }

                const grade = Number(trimmed);

                if (isNaN(grade)) {
                    throw new GradeValidationError(`Помилка: Оцінка має бути числом. Ви ввели: "${trimmed}"`);
                }

                if (grade < 1 || grade > 100) {
                    throw new GradeValidationError(`Помилка: Оцінка має бути в межах від 1 до 100 балів. Ви ввели: ${grade}`);
                }

                return grade;
            }

            onCheckStatus(e) {
                e.preventDefault();

                const errorBlock = document.getElementById('errorBlock');
                
                if (!errorBlock || !this.$monthInput || !this.$gradeInput || !this.$resultBlock) {
                    throw new Error("Елементи інтерфейсу не ініціалізовані.");
                }

                errorBlock.style.display = 'none';
                errorBlock.innerText = '';
                this.$resultBlock.style.display = 'none';
                this.$resultBlock.className = 'academic-result';

                try {
                    const month = this.validateMonth(this.$monthInput.value);
                    const grade = this.validateGrade(this.$gradeInput.value);

                    // Оцінка чудова
                    if (grade >= this.BAD_GRADE_THRESHOLD) {
                        this.$resultBlock.innerText = `✨ У учня хороша оцінка (${grade} балів). Виправлення не потрібне!`;
                        this.$resultBlock.classList.add('academic-result--success');
                    } 
                    // Оцінка погана, але це останній місяць семестру
                    else if (this.END_OF_SEMESTER_MONTHS.includes(month)) {
                        this.$resultBlock.innerText = `🛑 Оцінка погана (${grade} балів), але виправити її неможливо. Поточний місяць (${month}-й) є останнім у семестрі! Семестрові оцінки вже виставляються.`;
                        this.$resultBlock.classList.add('academic-result--danger');
                    } 
                    // Оцінка погана і час ще є
                    else {
                        this.$resultBlock.innerText = `💪 Оцінка незадовільна (${grade} балів). Учень має змогу її виправити, оскільки до кінця семестру ще є час.`;
                        this.$resultBlock.classList.add('academic-result--info');
                    }

                    this.$resultBlock.style.display = 'block';

                } catch (error) {
                    if (error instanceof ValidationError) {
                        errorBlock.innerText = `[${error.name}] ${error.message}`;
                        errorBlock.style.display = 'block';
                    } else {
                        errorBlock.innerText = `Невідома помилка системи: ${error.message}`;
                        errorBlock.style.display = 'block';
                    }
                }
            }

            render(targetSelector) {
                const form = document.createElement('form');
                form.className = 'academic-form';

                const monthGroup = document.createElement('div');
                monthGroup.className = 'academic-form__group';
                const monthLabel = document.createElement('label');
                monthLabel.className = 'academic-form__label';
                monthLabel.innerText = 'Місяць навчання (1-12):';
                this.$monthInput = document.createElement('input');
                this.$monthInput.className = 'academic-form__input';
                this.$monthInput.type = 'text';
                this.$monthInput.placeholder = 'Наприклад: 5';
                monthGroup.append(monthLabel);
                monthGroup.append(this.$monthInput);

                const gradeGroup = document.createElement('div');
                gradeGroup.className = 'academic-form__group';
                const gradeLabel = document.createElement('label');
                gradeLabel.className = 'academic-form__label';
                gradeLabel.innerText = 'Оцінка учня (1-100):';
                this.$gradeInput = document.createElement('input');
                this.$gradeInput.className = 'academic-form__input';
                this.$gradeInput.type = 'text';
                this.$gradeInput.placeholder = 'Наприклад: 45';
                gradeGroup.append(gradeLabel);
                gradeGroup.append(this.$gradeInput);

                const btn = document.createElement('button');
                btn.className = 'academic-form__button';
                btn.type = 'submit';
                btn.innerText = 'Перевірити статус';

                this.$resultBlock = document.createElement('div');
                this.$resultBlock.className = 'academic-result';

                form.append(monthGroup);
                form.append(gradeGroup);
                form.append(btn);
                form.append(this.$resultBlock);

                form.onsubmit = this.onCheckStatus.bind(this);

                if (targetSelector) {
                    const target = document.querySelector(targetSelector);
                    if (target) {
                        target.append(form);
                    } else {
                        throw new Error(`Селектор "${targetSelector}" не знайдено.`);
                    }
                } else {
                    throw new Error("Не передано цільовий селектор.");
                }

                this.$el = form;
                return form;
            }
        }

        window.onload = function () {
            const errorBlock = document.getElementById('errorBlock');

            try {
                if (errorBlock) {
                    errorBlock.innerText = '';
                    errorBlock.style.display = 'none';
                } else {
                    throw new Error(" Блок #errorBlock відсутній у розмітці.");
                }

                const app = new AcademicManager();
                app.render('#academicAppContainer');

            } catch (initError) {
                if (errorBlock) {
                    errorBlock.innerText = initError.message;
                    errorBlock.style.display = 'block';
                } else {
                    throw initError;
                }
            }
        };
    </script>
    </body>
</html>
