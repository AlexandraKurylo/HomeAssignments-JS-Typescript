<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Задача 6</title>
    </head>
    <body>
        <h1>Задача 6
        </h1>
        <p>З клавіатури вводяться вартість товару та кількість одиниць 3
            товарів. Обчислити вартість кожного товару окремо та загальну
            вартість. Вивести чек (як у супермаркеті) використовуючи елементи
            розмітки.
        </p>

        <script>
            let product1 = prompt("Вкажіть назву першого товару", "Товар №1");
            let quantity1 = parseInt(prompt(`Вкажіть кількість першого товару, (шт.)`, '0'));
            let value1 = parseFloat(prompt(`Вкажіть вартість першого товару, (грн)`, '0'));
           
            let product2 = prompt("Вкажіть назву другого товару", "Товар №2");
            let quantity2 = parseInt(prompt(`Вкажіть кількість другого товару (шт.)`, '0'));
            let value2 = parseFloat(prompt(`Вкажіть вартість другого товару, грн.`, '0'));
            
            let product3 = prompt("Вкажіть назву третього товару", "Товар №3");
            let quantity3 = parseInt(prompt(`Вкажіть кількість третього товару (шт.).`, '0'));
            let value3 = parseFloat(prompt(`Вкажіть вартість третього товару, грн.`, '0'));
            
            let result1 = value1 * quantity1;
            let result2 = value2 * quantity2;
            let result3 = value3 * quantity3;

            let totalResult = result1 + result2 + result3;

            document.write(`
            <div style="width: 400px; border: 1px solid #000; padding: 10px; background-color: #fff;">
                <h2 style="text-align: center; text-transform: uppercase;">ТОВАРНИЙ ЧЕК</h2>
                <p style="text-align: center; border-bottom: 1px dashed #000; padding-bottom: 5px;">Супермаркет "Market"</p>
                
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 10px;">
                    <thead>
                        <tr style="border-bottom: 1px dashed #000;">
                            <th style="text-align: left;">Товар</th>
                            <th style="text-align: center;">К-сть</th>
                            <th style="text-align: right;">Сума</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>${product1}</td>
                            <td style="text-align: center;">${quantity1}</td>
                            <td style="text-align: right;">${result1.toFixed(2)}</td>
                        </tr>
                        <tr>
                            <td>${product2}</td>
                            <td style="text-align: center;">${quantity2}</td>
                            <td style="text-align: right;">${result2.toFixed(2)}</td>
                        </tr>
                        <tr style="border-bottom: 1px dashed #000;">
                            <td>${product3}</td>
                            <td style="text-align: center;">${quantity3}</td>
                            <td style="text-align: right;">${result3.toFixed(2)}</td>
                        </tr>
                    </tbody>
                </table>

                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 20px; margin-bottom: 15px;">
                    <span style="text-transform: uppercase;">УСЬОГО:</span>
                    <span>${totalResult.toFixed(2)}грн</span>
                </div>
                
                <p style="text-align: center; border-top: 1px dashed #000;">Дякуємо за покупку!</p>
            </div> 
            `)
            
        </script>
    </body>
</html>
