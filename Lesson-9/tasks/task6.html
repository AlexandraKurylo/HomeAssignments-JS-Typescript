<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Задача 6</title>
    </head>
    <body>
        <h1>Задача 6
        </h1>
        <p>Дано масив елементів. Усі елементи, які більші за перший елемент
            помножити на 2</p>

        <script>
            function formatArray(arr) {
                return `[${arr.join(', ')}]`;
            }

            function transformNumbers(arr) {
                if (arr.length === 0) 
                    return [];

                const firstElement = arr[0];

                return arr.map((item) => {
                    if (item > firstElement) {
                        return item * 2; 
                    }
                    return item; 
                });
            }

            function displayComparison(original, transformed) {
                const originalArray = formatArray(original);
                const transformedArray = formatArray(transformed);

                document.write(`
                    <ul style="font-size: 18px;">
                        <li>Перший елемент: <b style="color: red; font-size: 20px;">${original[0]}</b></li>
                        <li>Оригінальний масив: ${originalArray}</li>
                        <li>Результат трансформації: <b style="color: green;">${transformedArray}</b></li>
                    </ul>
                `);
            }

            const sourceData = [10, 5, 20, 8, 12, 3];
            const resultData = transformNumbers(sourceData);

            displayComparison(sourceData, resultData);
        </script>
    </body>
</html>
