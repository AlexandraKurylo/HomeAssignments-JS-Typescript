<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/reset.css">
        <title>Задача: Shop Iterator</title>
        <style>
            .task-card {
                font-family: 'Montserrat', sans-serif;
                background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
                color: #f1f5f9;
            }

            .task-card__container {
                max-width: 1240px;
                padding: 40px 20px;
                min-height: 100vh;
                margin: 0 auto;
            }

            .task-card__main {
                background: rgba(30, 41, 59, 0.7);
                border: 1px solid #334155;
                border-radius: 24px;
                padding: 40px;
                max-width: 500px;
                margin: auto;
                backdrop-filter: blur(12px);
                box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
            }

            .task-card__title {
                color: #38bdf8;
                font-size: 22px;
                font-weight: 800;
                margin-bottom: 20px;
                text-align: center;
            }

            button {
                width: 100%;
                padding: 12px;
                border-radius: 12px;
                border: none;
                background: #38bdf8;
                color: #0f172a;
                font-weight: 700;
                cursor: pointer;
                transition: 0.3s;
            }

            button:hover {
                background: #7dd3fc;
            }

            #shopOutput {
                margin-top: 20px;
                padding: 15px;
                border-top: 1px solid #334155;
            }

            .product-item {
                color: #cbd5e1;
                margin: 5px 0;
                font-size: 16px;
            }
        </style>
    </head>
    <body>

        <div class="task-card">
            <div class="task-card__container">
                <div class="task-card__main">
                    <h2 class="task-card__title">Магазин (Iterator)</h2>
                    <button id="reportBtn">Показати звіт</button>
                    <div id="shopOutput"></div>
                </div>
            </div>
        </div>

        <script>
            class Product {
                constructor(name, price, count) {
                    this.name = name;
                    this.price = price;
                    this.count = count;
                }
                get totalValue() { return this.price * this.count; }
            }

            class Shop {
                constructor(products) { 
                    this.products = products; 
                }
                [Symbol.iterator]() {
                    let index = 0;
                    const products = this.products;
                    return {
                        next: () => {
                            if (index < products.length) {
                                const product = products[index++];
                                return { value: `${product.name} — ${product.totalValue}`, done: false };
                            }
                            return { done: true };
                        }
                    };
                }
            }

            const shop = new Shop([
                new Product('Молоко', 30, 2),
                new Product('Хліб', 20, 3),
                new Product('Сир', 150, 1)
            ]);

            document.body.addEventListener('click', (event) => {
                if (event.target && event.target.id === 'reportBtn') {
                    const output = document.getElementById('shopOutput');
                    
                    try {
                        if (!output) throw new Error("Контейнер для звіту відсутній!");
                        
                        output.innerHTML = '';

                        for (const item of shop) {
                            const productItem = document.createElement('p');
                            productItem.className = 'product-item';
                            productItem.textContent = item;
                            output.appendChild(productItem);
                        }
                    } catch (err) {
                        console.error(err.message);
                    }
                }
            });
        </script>
    </body>
</html>
