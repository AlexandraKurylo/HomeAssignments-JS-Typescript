<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/reset.css">
        <title>Завдання: Колекції JS</title>
        <style>
            .task {
                font-family: 'Montserrat', sans-serif;
                background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
                color: #f1f5f9;
                
            }

            .task__container {
                max-width: 840px;
                padding: 40px 20px;
                margin: 0 auto;
            }

            .task__card {
                background: rgba(30, 41, 59, 0.7);
                border: 1px solid #334155;
                border-radius: 24px;
                padding: 30px;
                margin-bottom: 25px;
                backdrop-filter: blur(12px);
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            }

            .task__title {
                color: #38bdf8;
                font-size: 18px;
                font-weight: 800;
                margin-bottom: 15px;
                border-bottom: 1px solid #334155;
                padding-bottom: 10px;
            }

            .task__result {
                font-size: 14px;
                color: #cbd5e1;
                line-height: 1.6;
                white-space: pre-wrap;
            }

            .error-message {
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid #ef4444;
                color: #fca5a5;
                padding: 12px;
                border-radius: 12px;
                display: none;
                margin-top: 10px;
                text-align: center;
                font-weight: 600;
            }
        </style>
    </head>
    <body>

        <div class="task">
            <div class="task__container" id="mainContainer"></div>
            <div id="errorBlock" class="error-message"></div>
        </div>

        <script>

            function getAgeStats(ages) {
                const map = new Map();
                let maxAge = -Infinity;
                for (const age of ages) {
                    map.set(age, (map.get(age) ?? 0) + 1);
                    if (age > maxAge) maxAge = age;
                }
                return `Підрахунок кожного віку: ${JSON.stringify(Object.fromEntries(map))}\nМаксимальний вік: ${maxAge}`;
            }

            function countBooksByAuthor(books) {
                const map = new Map();
                books.forEach(b => map.set(b.author, (map.get(b.author) ?? 0) + 1));
                return JSON.stringify(Object.fromEntries(map), null, 2);
            }

            function countVisits(logins) {
                const map = new Map();
                logins.forEach(login => map.set(login, (map.get(login) ?? 0) + 1));
                return JSON.stringify(Object.fromEntries(map), null, 2);
            }

            function getUniStats(students) {
                const faculties = new Set(students.map(student => student.faculty));
                const courses = new Map();
                students.forEach(student => courses.set(student.course, (courses.get(student.course) ?? 0) + 1));
                return `Кількість різних факультетів: ${faculties.size}\nСтуденти за курсами: ${JSON.stringify(Object.fromEntries(courses))}`;
            }

            function processTemps(temps) {
                const counts = new Map();
                temps.map(temp => Math.ceil(temp)).forEach(temp => counts.set(temp, (counts.get(temp) ?? 0) + 1));
                return `Кількість входжень (після Math.ceil): ${JSON.stringify(Object.fromEntries(counts))}`;
            }

            function getClubStats(math, history) {
                const mathSet = new Set(math);
                const both = history.filter(name => mathSet.has(name));
                const all = new Set([...math, ...history]);
                return `Відвідують обидва гуртки: ${both.join(', ') || 'немає'}\nВсього унікальних студентів: ${all.size}`;
            }

            window.onload = () => {
                const container = document.getElementById('mainContainer');
                const errorBlock = document.getElementById('errorBlock');

                try {
                    if (!container) {
                        throw new Error("Не знайдено #mainContainer для виводу завдань!");
                    }
                    if (!errorBlock) {
                        throw new Error("Не знайдено #errorBlock для повідомлень про помилки!");
                    }

                    const tasks = [
                        { title: "Задача 5: Вік учнів", res: getAgeStats([12, 14, 12, 15, 14, 12]) },
                        { title: "Задача 6: Книги за автором", res: countBooksByAuthor([{author: "Шевченко"}, {author: "Шевченко"}, {author: "Франко"}]) },
                        { title: "Задача 7: Відвідування", res: countVisits(['ivan', 'ivan', 'anna', 'petro', 'anna']) },
                        { title: "Задача 8: Студенти", res: getUniStats([{faculty: "IT"}, {faculty: "Math"}, {faculty: "IT"}]) },
                        { title: "Задача 9: Температури", res: processTemps([12.4, 24.9, 10.6, 12.4, 24.9, 12.4, 10.6, 11.9]) },
                        { title: "Задача 10: Гуртки", res: getClubStats(['Ivan', 'Petro'], ['Petro', 'Anna']) }
                    ];

                    tasks.forEach(task => {
                        const card = document.createElement('div');
                        card.className = 'task__card';

                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'task__title';
                        titleDiv.textContent = task.title;

                        const resultDiv = document.createElement('div');
                        resultDiv.className = 'task__result';
                        resultDiv.textContent = task.res;

                        card.appendChild(titleDiv);
                        card.appendChild(resultDiv);
                        
                        container.appendChild(card);
                    });

                } catch (error) {
                    if (errorBlock) {
                        errorBlock.textContent = "Помилка: " + error.message;
                        errorBlock.style.display = 'block';
                    } else {
                        console.error("Критична помилка: " + error.message);
                    }
                }
            };
        </script>
    </body>
</html>
