<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/reset.css">
        <title>Задача: Генератор парних чисел</title>
        <style>
            .task-card {
                font-family: 'Montserrat', sans-serif;
                background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
                color: #f1f5f9;
            }

            .task-card__container {
                max-width: 1240px;
                padding: 40px 20px;
                min-height: 100vh;
                margin: 0 auto;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .task-card__main {
                background: rgba(30, 41, 59, 0.7);
                border: 1px solid #334155;
                border-radius: 24px;
                padding: 40px;
                width: 100%;
                max-width: 450px;
                backdrop-filter: blur(12px);
                box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
                text-align: center;
            }

            .task-card__title {
                color: #38bdf8;
                font-size: 22px;
                font-weight: 800;
                margin-bottom: 20px;
            }

            button {
                padding: 12px 25px;
                border-radius: 12px;
                border: none;
                background: #38bdf8;
                color: #0f172a;
                font-weight: 700;
                cursor: pointer;
                transition: 0.3s;
            }

            button:hover {
                background: #7dd3fc;
            }

            #resultsOutput {
                margin-top: 20px;
                color: #f59e0b;
                font-size: 18px;
                font-weight: 700;
            }

            .num-item {
                display: block;
                margin: 5px 0;
            }
        </style>
    </head>
    <body>

        <div class="task-card">
            <div class="task-card__container">
                <div class="task-card__main">
                    <h2 class="task-card__title">Генератор парних чисел</h2>
                    <button id="generateBtn">Згенерувати 5 чисел</button>
                    <div id="resultsOutput"></div>
                </div>
            </div>
        </div>

        <script>
            function* generateEvenNumbers(count) {
                let generated = 0;
                while (generated < count) {
                    let num = Math.floor(Math.random() * 100);
                    if (num % 2 === 0) {
                        yield num;
                        generated++;
                    }
                }
            }

            document.body.addEventListener('click', (event) => {
                if (event.target && event.target.id === 'generateBtn') {
                    const output = document.getElementById('resultsOutput');
                    
                    try {
                        if (!output) throw new Error("Контейнер для результатів відсутній!");
                        
                        output.innerHTML = '';
                        const evenGen = generateEvenNumbers(5);

                        for (const num of evenGen) {
                            const span = document.createElement('span');
                            span.className = 'num-item';
                            span.textContent = `Парне число: ${num}`;
                            output.appendChild(span);
                        }
                    } catch (err) {
                        console.error(err.message);
                    }
                }
            });
        </script>
    </body>
</html>
