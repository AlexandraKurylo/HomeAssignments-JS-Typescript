<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Задача 3</title>
    </head>
    <body>
        <h1>
            Задача 3
        </h1>
        <p>Випадковим чином генерується число від 1 до 5. Спробуйте вгадати
            число
            за 2 спроби.</p>

        <script>
            const randomNumber = Math.floor(Math.random()* 5) + 1;
            let result;
            alert('Вгадайте число від 1 до 5 за дві спроби');
            let attempt = parseInt(prompt('Ваша перша спроба. Впишіть число від 1 до 5', '1'));

            if (isNaN(attempt) || attempt < 1 || attempt > 5)
                alert('Ви ввели некоректне число! Спроба втрачена.');

            if (attempt === randomNumber) 
                result = ('Ви вгадали число з першої спроби!');

            else {
                attempt = parseInt(prompt('З першої споби не вийшло. Ваша друга спроба. Впишіть число від 1 до 5 ', '1'));

                if (isNaN(attempt) || attempt < 1 || attempt > 5)
                    alert('Ви ввели некоректне число! Це була остання спроба.');
                
                if (attempt === randomNumber) 
                    result = ('Ви вгадали число з другої спроби!');
                 else
                    result = ('На жаль, Ви не вгадали число за 2 спроби.');
            }

            document.write(`
            <h2>Результат</h2>
            <h3>${result} Згенероване число: ${randomNumber}</h3>
            `)
        </script>
    </body>
</html>
