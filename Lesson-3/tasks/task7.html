<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Задача 7</title>
    </head>
    <body>
        <h1>Задача 7
        </h1>
        <p>З клавіатури вводиться номер місяця. Вивести до якої пори він
            відноситься.
        </p>

        <script>
            const monthNumber = parseInt(prompt('Введіть номер місяця (1-12):', '1'));
            let season;

            switch (monthNumber) {
                case 12:
                case 1:
                case 2:
                    season = "Зима ❄️";
                    break;
                case 3:
                case 4:
                case 5:
                    season = "Весна 🌱";
                    break;
                case 6:
                case 7:
                case 8:
                    season = "Літо ☀️";
                    break;
                case 9:
                case 10:
                case 11:
                    season = "Осінь 🍂";
                    break;
                default:
                    season = "Такого номеру місяця не існує! Введіть число від 1 до 12.";
            }

            document.write(`<h2>Номеру місяця ${monthNumber} відповідає така пора року: ${season}</h2>`);
        </script>
    </body>
</html>
