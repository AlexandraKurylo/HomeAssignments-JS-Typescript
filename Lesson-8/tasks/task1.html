<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Задача 0</title>
    </head>
    <body>
        <h1>Задача 1</h1>
        <div>
            <p>Дано масив, який містить оцінки з К предметів. Знайти середній
                бал і з’ясувати до якої категорії він відноситься (відмінник,
                двійочник (має хоча би одну двійку), хорошист (оцінки добре і
                відмінно), трійочник(є хоча би одна трійка)).
            </p>
        </div>
        <script>
            function calculateAverage(grades) {
                let sum = 0;
                for (let i = 0; i < grades.length; i++) {
                    sum += grades[i];
                }
                return sum / grades.length;
            }

            function determineCategory(grades) {
                let minGrade = 5;
                for (let i = 0; i < grades.length; i++) {
                    if (grades[i] < minGrade) 
                        minGrade = grades[i];
                }

                switch (minGrade) {
                    case 2: return "Двійочник";
                    case 3: return "Трійочник";
                    case 4: return "Хорошист";
                    case 5: return "Відмінник";
                    default: return "Немає оцінок";
                }
            }

            function stringifyGrades(grades) {
                let res = "";
                for (let i = 0; i < grades.length; i++) {
                    if (i > 0) 
                        res += ", "; 
                    res += grades[i];
                }
                return res;
            }

            if (confirm('Почати тестування?')) {
                const studentGrades = [5, 4, 3, 5];

                const average = calculateAverage(studentGrades);
                const category = determineCategory(studentGrades);
                const list = stringifyGrades(studentGrades);

                document.write("Оцінки: " + list + "<br>");
                document.write("Середній бал: " + average.toFixed(2) + "<br>");
                document.write("Категорія: " + category);
            }

        </script>
    </body>
</html>
