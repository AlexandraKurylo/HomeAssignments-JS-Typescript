<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/reset.css">
        <title>Задача 2 - Симулятор Байрактара (Зображення)</title>
        <style>
            body {
                font-family: 'Montserrat', sans-serif;
                background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
                color: #f1f5f9;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 40px 20px;
                overflow: hidden; 
                position: relative;
            }

            .game-panel {
                background: rgba(15, 23, 42, 0.85);
                border: 2px solid #ef4444; 
                border-radius: 24px;
                padding: 30px;
                width: 100%;
                max-width: 500px;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
                backdrop-filter: blur(10px);
                position: relative;
                z-index: 10;
                text-align: center;
            }

            .game-panel__title {
                font-size: 24px;
                font-weight: 800;
                color: #ef4444;
                margin-bottom: 10px;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .game-panel__description {
                font-size: 14px;
                color: #94a3b8;
                line-height: 1.5;
                margin-bottom: 15px;
            }

            .game-panel__error-message {
                background: rgba(239, 68, 68, 0.15);
                border: 1px solid #ef4444;
                color: #fca5a5;
                border-radius: 12px;
                padding: 12px 16px;
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 15px;
                display: none;
            }

            .enemy-tank {
                position: absolute;
                width: 70px;
                height: auto;
                cursor: crosshair;
                user-select: none;
                z-index: 1;
                will-change: top; 
                -webkit-user-drag: none;
            }

            .enemy-tank--destroyed {
                width: 90px;
                cursor: default;
                pointer-events: none;
            }
        </style>
    </head>
    <body>

        <div class="game-panel">
            <h2 class="game-panel__title">Bayraktar (Задача 2)</h2>
            <p class="game-panel__description">З верхньої частини екрану у
                випадковій позиції по горизонталі з’являються танки, які їдуть
                вниз. При кліку на танк він вибухає і зникає з екрану.
            </p>

            <div class="game-panel__error-message" id="errorBlock"></div>
        </div>

        <script>
        const activeTanks = [];
        function getRandomValue(min, max) {
            return Math.random() * (max - min) + min;
        }

        class Tank {
            constructor(parentContainer) {
                if (parentContainer) {
                    this.parent = parentContainer;
                    
                    this.tankImageSrc = "../images/tank.png";
                    this.explosionImageSrc = "../images/boom.png";

                    this.element = document.createElement('img');
                    this.element.classList.add('enemy-tank');
                    this.element.src = this.tankImageSrc;
                    this.element.alt = "Ворожий танк";

                    this.isAlive = true;
                    this.top = -80;
                    this.left = getRandomValue(20, window.innerWidth - 100);
                    this.speed = getRandomValue(1.5, 4.0); 

                    this.element.style.left = this.left + 'px';
                    this.element.style.top = this.top + 'px';

                    this.parent.appendChild(this.element);
                } else {
                    throw new Error("Не знайдено контейнер для створення танка.");
                }
            }

            moveDown() {
                if (this.element && this.isAlive) {
                    this.top += this.speed;
                    this.element.style.top = this.top + 'px';
                    if (this.top > window.innerHeight) {
                        this.top = -80;
                        this.left = getRandomValue(20, window.innerWidth - 100);
                        this.element.style.left = this.left + 'px';
                        this.speed = getRandomValue(1.5, 4.0);
                    }
                }
            }

            destroy() {
                if (this.element && this.isAlive) {
                    this.isAlive = false;
                    this.element.src = this.explosionImageSrc;
                    this.element.classList.add('enemy-tank--destroyed');
                    const tankElement = this.element;
                    setTimeout(function() {
                        if (tankElement && tankElement.parentNode) {
                            tankElement.parentNode.removeChild(tankElement);
                        }
                    }, 700);
                }
            }
        }

        function spawnTank(body) {
            if (body) {
                const tank = new Tank(body);
                activeTanks.push(tank);
            }
        }

        window.onload = function() {
            const errorBlock = document.getElementById('errorBlock');
            const body = document.body;
            
            const initialTanksCount = 6;

            try {
                if (errorBlock) {
                    errorBlock.innerText = '';
                    errorBlock.style.display = 'none';
                } else {
                    throw new Error("Блок #errorBlock відсутній у розмітці.");
                }

                if (body) {
                    for (let i = 0; i < initialTanksCount; i++) {
                        spawnTank(body);
                    }

                    setInterval(function() {
                        spawnTank(body);
                    }, 3500);

                    setInterval(function() {
                        try {
                            activeTanks.forEach(function(tank) {
                                tank.moveDown();
                            });
                        } catch (moveError) {
                            if (errorBlock) {
                                errorBlock.innerText = moveError.message;
                                errorBlock.style.display = 'block';
                            }
                        }
                    }, 25);

                    body.addEventListener('click', function(e) {
                        try {
                            const target = e.target;
                            if (target.classList.contains('enemy-tank')) {
                                const tankInstance = activeTanks.find(function(tank) {
                                    return tank.element === target;
                                });

                                if (tankInstance) {
                                    tankInstance.destroy();
                                    const index = activeTanks.indexOf(tankInstance);
                                    if (index > -1) {
                                        activeTanks.splice(index, 1);
                                    }
                                }
                            }
                        } catch (clickError) {
                            if (errorBlock) {
                                errorBlock.innerText = clickError.message;
                                errorBlock.style.display = 'block';
                            }
                        }
                    });

                } else {
                    throw new Error("Не вдалося отримати доступ до document.body.");
                }

            } catch (initError) {
                if (errorBlock && initError.message !== "Блок #errorBlock відсутній у розмітці.") {
                    errorBlock.innerText = initError.message;
                    errorBlock.style.display = 'block';
                } else {
                    throw initError;
                }
            }
        };
    </script>
    </body>
</html>
