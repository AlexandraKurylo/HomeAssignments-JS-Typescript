<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/reset.css">
        <title>Задача 9 - Гра "Перекладач"</title>
        <style>
            .translator-game {
                font-family: 'Montserrat', sans-serif;
                background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
                color: #f1f5f9;
            }

            .translator-game__container {
                max-width: 1240px;
                min-height: 100vh;
                margin: 0 auto;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 40px 20px;
            }

            .game-card {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 24px;
                padding: 35px;
                width: 100%;
                max-width: 600px;
                box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
            }

            .game-card__title {
                font-size: 22px;
                font-weight: 800;
                color: #38bdf8;
                text-align: center;
                margin-bottom: 25px;
            }

            .game-card__error-message {
                background: rgba(239, 68, 68, 0.15);
                border: 1px solid #ef4444;
                color: #fca5a5;
                border-radius: 12px;
                padding: 12px 16px;
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 20px;
                text-align: center;
                display: none;
            }

            .word-game {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 25px;
            }

            .word-game__column {
                background: #0f172a;
                border: 2px solid #334155;
                border-radius: 16px;
                padding: 15px;
                display: flex;
                flex-direction: column;
                gap: 12px;
                min-height: 250px;
            }

            .word-card {
                background: #1e293b;
                border: 2px solid #475569;
                border-radius: 10px;
                padding: 14px;
                font-size: 15px;
                font-weight: 700;
                text-align: center;
                cursor: pointer;
                user-select: none;
                transition: all 0.2s ease;
            }

            .word-card:hover {
                border-color: #94a3b8;
                background: #243146;
            }

            .word-card--selected {
                border-color: #38bdf8;
                background: rgba(56, 189, 248, 0.1);
                box-shadow: 0 0 12px rgba(56, 189, 248, 0.2);
            }

            .word-card--error {
                border-color: #ef4444;
                background: rgba(239, 68, 68, 0.15);
                box-shadow: 0 0 12px rgba(239, 68, 68, 0.2);
            }

            .word-card--success {
                border-color: #22c55e;
                background: rgba(34, 197, 94, 0.15);
            }

            .game-card__victory {
                text-align: center;
                padding: 30px 0;
                font-size: 18px;
                font-weight: 700;
                color: #22c55e;
                display: none;
            }
        </style>
    </head>
    <body>

        <div class="translator-game">
            <div class="translator-game__container">
                <div class="translator-game__card game-card">
                    <h2 class="game-card__title">Знайдіть пари слів</h2>
                    <div class="game-card__error-message" id="errorBlock"></div>
                    <div id="gamePlatformContainer"></div>
                    <div class="game-card__victory" id="victoryBlock">🎉
                        Вітаємо!
                        Усі
                        пари знайдено правильно!</div>
                </div>
            </div>
        </div>

        <script>
        class TranslationGame {
            constructor(wordsData) {
                this.wordsData = wordsData;
                this.firstSelectedCard = null;
                this.isProcessing = false;
                this.totalPairs = wordsData.length;
                this.foundPairs = 0;
            }

            shuffleArray(array) {
                return [...array].sort(() => Math.random() - 0.5);
            }

            createCardElement(id, text, lang) {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerText = text;
            
                card.setAttribute('data-id', id);
                card.setAttribute('data-lang', lang);

                return card;
            }


            handleCardClick(e) {
                if (this.isProcessing) return;
                
                const clickedCard = e.target;
                if (!clickedCard || !clickedCard.classList.contains('word-card')) return;

                if (this.firstSelectedCard === clickedCard) {
                    clickedCard.classList.remove('word-card--selected');
                    this.firstSelectedCard = null;
                    return;
                }

                if (!this.firstSelectedCard) {
                    this.firstSelectedCard = clickedCard;
                    this.firstSelectedCard.classList.add('word-card--selected');
                    return;
                }

                const firstId = this.firstSelectedCard.getAttribute('data-id');
                const firstLang = this.firstSelectedCard.getAttribute('data-lang');
                
                const secondId = clickedCard.getAttribute('data-id');
                const secondLang = clickedCard.getAttribute('data-lang');

                if (firstLang === secondLang) {
                    this.firstSelectedCard.classList.remove('word-card--selected');
                    this.firstSelectedCard = clickedCard;
                    this.firstSelectedCard.classList.add('word-card--selected');
                    return;
                }

                if (firstId === secondId) {
                    this.isProcessing = true;
                    
                    this.firstSelectedCard.classList.replace('word-card--selected', 'word-card--success');
                    clickedCard.classList.add('word-card--success');
                    const card1 = this.firstSelectedCard;
                    const card2 = clickedCard;

                    setTimeout(() => {
                        card1.remove();
                        card2.remove();
                        this.foundPairs++;
                        this.isProcessing = false;

                        if (this.foundPairs === this.totalPairs) {
                            const victory = document.getElementById('victoryBlock');
                            if (victory) 
                                victory.style.display = 'block';
                        }
                    }, 400);

                    this.firstSelectedCard = null;
                } 
                else {
                    this.isProcessing = true;

                    this.firstSelectedCard.classList.replace('word-card--selected', 'word-card--error');
                    clickedCard.className = 'word-card word-card--error';

                    const card1 = this.firstSelectedCard;
                    const card2 = clickedCard;

                    setTimeout(() => {
                        card1.classList.remove('word-card--error');
                        card2.classList.remove('word-card--error');
                        this.isProcessing = false;
                    }, 1000);

                    this.firstSelectedCard = null;
                }
            }

            render(targetSelector) {
                const gameGrid = document.createElement('div');
                gameGrid.className = 'word-game';

                const enColumn = document.createElement('div');
                enColumn.className = 'word-game__column';
                
                const uaColumn = document.createElement('div');
                uaColumn.className = 'word-game__column';

                const shuffledEn = this.shuffleArray(this.wordsData);
                const shuffledUa = this.shuffleArray(this.wordsData);

                shuffledEn.forEach(word => {
                    enColumn.append(this.createCardElement(word.id, word.en, 'en'));
                });

                shuffledUa.forEach(word => {
                    uaColumn.append(this.createCardElement(word.id, word.ua, 'ua'));
                });

                enColumn.onclick = this.handleCardClick.bind(this);
                uaColumn.onclick = this.handleCardClick.bind(this);

                gameGrid.append(enColumn);
                gameGrid.append(uaColumn);

                if (targetSelector) {
                    const target = document.querySelector(targetSelector);
                    if (target) {
                        target.append(gameGrid);
                    } else {
                        throw new Error(`Цільовий селектор "${targetSelector}" відсутній в DOM.`);
                    }
                } else {
                    throw new Error("Метод render не отримав селектор призначення.");
                }

                this.$el = gameGrid;
                return gameGrid;
            }
        }

        window.onload = function () {
            const errorBlock = document.getElementById('errorBlock');

            try {
                if (errorBlock) {
                    errorBlock.innerText = '';
                    errorBlock.style.display = 'none';
                } else {
                    throw new Error("Блок помилок #errorBlock не знайдено у верстці.");
                }

                const wordsRepository = [
                    { id: 0, en: 'table', ua: 'стіл' },
                    { id: 1, en: 'car', ua: 'автомобіль' },
                    { id: 2, en: 'bus', ua: 'автобус' },
                    { id: 3, en: 'man', ua: 'людина' },
                    { id: 4, en: 'boy', ua: 'хлопець' }
                ];

                const app = new TranslationGame(wordsRepository);
                app.render('#gamePlatformContainer');

            } catch (gameError) {
                if (errorBlock) {
                    errorBlock.innerText = gameError.message;
                    errorBlock.style.display = 'block';
                } else {
                    throw gameError;
                }
            }
        };
    </script>
    </body>
</html>
