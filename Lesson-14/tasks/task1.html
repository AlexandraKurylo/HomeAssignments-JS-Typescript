<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Завдання 1</title>
    </head>
    <body>

        <script>
            const techCompany = {
                currentName: "Meta Platforms Inc.",
                owner: "Mark Zuckerberg",
                developedSites: [
                    {
                        siteName: "TheFacebook",
                        companyNameAtLaunch: "Facebook Inc.",
                        year: 2004,
                        price: 500000,
                        sponsors: [
                            { 
                                firstName: "Peter", 
                                lastName: "Thiel", 
                                investment: 500000 
                            },
                            { 
                                firstName: "Eduardo", 
                                lastName: "Saverin", 
                                investment: 15000 
                            }
                        ]
                    },
                    {
                        siteName: "Instagram",
                        companyNameAtLaunch: "Facebook Inc.",
                        year: 2012,
                        price: 1000000000,
                        sponsors: [
                            { 
                                firstName: "Kevin", 
                                lastName: "Systrom", 
                                investment: 250000 
                            },
                            { 
                                firstName: "Matt", 
                                lastName: "Cohler", 
                                investment: 500000 
                            }
                        ]
                    },
                    {
                        siteName: "Oculus VR Web Platform",
                        companyNameAtLaunch: "Facebook Inc.",
                        year: 2014,
                        price: 2000000,
                        sponsors: [
                            { 
                                firstName: "Marc", 
                                lastName: "Andreessen", 
                                investment: 75000 
                            }
                        ]
                    },
                    {
                        siteName: "Horizon Worlds Portal",
                        companyNameAtLaunch: "Meta Platforms Inc.",
                        year: 2021,
                        price: 5000000,
                        sponsors: [
                            { 
                                firstName: "Vanguard", 
                                lastName: "Group", 
                                investment: 1500000 
                            }
                        ]
                    }
                ]
            };

            function printCompanyData(company) {
                document.write(`<h2>COMPANY: ${company.currentName} (Owner: ${company.owner})</h2>`);
                document.write("<h3>Developed Websites Portfolio:</h3>");
                
                company.developedSites.forEach(site => {
                    document.write(`<p><b>Project: ${site.siteName}</b><br>`);
                    document.write(`Launched by: ${site.companyNameAtLaunch} | Year: ${site.year} | Price: $${site.price}<br>`);
                    document.write("Sponsors:</p>");
                    document.write("<ul>");
                    site.sponsors.forEach(s => {
                        document.write(`<li>${s.firstName} ${s.lastName} (Invested: $${s.investment})</li>`);
                    });
                    document.write("</ul>");
                });
                document.write("<hr>");
            }



            // 1) Знайти загальну вартість усіх сайтів
            function getTotalCost(sites) {
                return sites.reduce((sum, site) => sum + site.price, 0);
            }

            // 2) Знайти кількість сайтів, що було зроблено між 2000 та 2009 рр.
            function getSitesCountBetween2000And2009(sites) {
                return sites.filter(site => site.year >= 2000 && site.year <= 2009).length;
            }

            // 3) Знайти кількість сайтів, де сума спонсорських вкладень була більшою за 100000
            function getRichSponsorsSitesCount(sites) {
                return sites.filter(site => {
                    const totalSponsorsSum = site.sponsors.reduce((sum, sponsor) => sum + sponsor.investment, 0);
                    return totalSponsorsSum > 100000;
                }).length;
            }

            // 4) Створити загальний список усіх спонсорів (поки можуть повторюватись, просто зібрати усі у масив)
            function getAllSponsorsList(sites) {
                const allSponsors = [];
                for (let i = 0; i < sites.length; i++) {
                    for (let j = 0; j < sites[i].sponsors.length; j++) {
                        allSponsors.push(sites[i].sponsors[j]);
                    }
                }
                return allSponsors;
            }

            // 5) Знайти рік, коли прибуток був найбільшим
            function getMostProfitableYear(sites) {
                const profitByYear = {};
                sites.forEach(site => {
                    if (!profitByYear[site.year]) {
                        profitByYear[site.year] = 0;
                    }
                    profitByYear[site.year] += site.price;
                });

                let maxProfit = 0;
                let bestYear = null;

                for (let year in profitByYear) {
                    if (profitByYear[year] > maxProfit) {
                        maxProfit = profitByYear[year];
                        bestYear = year;
                    }
                }
                return { year: bestYear, profit: maxProfit };
            }

            // 6) Упорядкувати список за спаданням прибуткуr
            function sortSitesByProfitDescending(sites) {
                return [...sites].sort((a, b) => b.price - a.price);
            }

            // 7) Створити 2 окремих списки з копіями об’єктів, що містять сайти з вартість до 10000 і більше 10000
            function splitSitesByPriceThreshold(sites) {
                const budgetSites = [];
                const premiumSites = [];

                sites.forEach(site => {
                    const siteCopy = { 
                        ...site, 
                        sponsors: site.sponsors.map(sponsor => ({ ...sponsor })) 
                    };

                    if (site.price <= 10000) {
                        budgetSites.push(siteCopy);
                    } else {
                        premiumSites.push(siteCopy);
                    }
                });

                return { budget: budgetSites, premium: premiumSites };
            }


            printCompanyData(techCompany);
            const portfolio = techCompany.developedSites;

            document.write("<h2>ANALYSIS RESULTS</h2>");

            // Task 1
            document.write(`<p><strong>1) Total cost of all websites:</strong> $${getTotalCost(portfolio)}</p>`);

            // Task 2
            document.write(`<p><strong>2) Number of websites built between 2000 and 2009:</strong> ${getSitesCountBetween2000And2009(portfolio)}</p>`);

            // Task 3
            document.write(`<p><strong>3) Number of websites with sponsor investments > 100,000:</strong> ${getRichSponsorsSitesCount(portfolio)}</p>`);

            // Task 4
            document.write("<p><strong>4) General list of all sponsors:</strong></p><ul>");
            const sponsorsList = getAllSponsorsList(portfolio);
            sponsorsList.forEach(s => {
                document.write(`<li>${s.firstName} ${s.lastName} (Investment: $${s.investment})</li>`);
            });
            document.write("</ul>");

            // Task 5
            const bestYearData = getMostProfitableYear(portfolio);
            document.write(`<p><strong>5) Most profitable year:</strong> ${bestYearData.year} (Total profit: $${bestYearData.profit})</p>`);

            // Task 6
            document.write("<p><strong>6) List of websites sorted by profit descending:</strong></p><ol>");
            const sortedPortfolio = sortSitesByProfitDescending(portfolio);
            sortedPortfolio.forEach(site => {
                document.write(`<li>${site.siteName} — $${site.price} (${site.year})</li>`);
            });
            document.write("</ol>");

            // Task 7
            const splitResult = splitSitesByPriceThreshold(portfolio);

            document.write("<p><strong>7a) Budget websites (<= 10,000):</strong></p><ul>");
            if(splitResult.budget.length === 0) {
                document.write("<li>No budget websites found.</li>");
            } else {
                splitResult.budget.forEach(site => document.write(`<li>${site.siteName} ($${site.price})</li>`));
            }
            document.write("</ul>");

            document.write("<p><strong>7b) Premium websites ( > 10,000):</strong></p><ul>");
            splitResult.premium.forEach(site => {
                document.write(`<li>${site.siteName} ($${site.price})</li>`);
            });
            document.write("</ul>");
        </script>
    </body>
</html>
