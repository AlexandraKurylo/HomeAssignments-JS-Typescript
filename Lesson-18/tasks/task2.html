<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/reset.css">
        <title>Task 2 - Currency Converter</title>
        <style>
            .converter {
                font-family: 'Montserrat', sans-serif;
                background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
                color: #f1f5f9;
            }

            .converter__container {
                max-width: 1200px;
                margin: 0 auto;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }

            .converter__app {
                background: #1e293b;
                border: 4px solid #334155;
                border-radius: 24px;
                padding: 30px;
                width: 100%;
                max-width: 420px;
                box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
            }

            .converter__title {
                font-size: 22px;
                font-weight: 700;
                text-align: center;
                margin-bottom: 24px;
                color: #38bdf8;
            }

            .converter__group {
                margin-bottom: 20px;
            }

            .converter__label {
                display: block;
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 8px;
                color: #94a3b8;
            }

            .converter__input-wrapper {
                position: relative;
                display: flex;
                align-items: center;
            }

            .converter__input {
                width: 100%;
                background: #0f172a;
                border: 1px solid #475569;
                border-radius: 12px;
                padding: 14px 55px 14px 16px;
                font-size: 18px;
                font-weight: 600;
                color: #f1f5f9;
                outline: none;
                transition: border-color 0.2s;
            }

            .converter__input::-webkit-outer-spin-button,
            .converter__input::-webkit-inner-spin-button {
                -webkit-appearance: none;
                margin: 0;
            }

            .converter__input:focus {
                border-color: #38bdf8;
            }

            .converter__input--readonly {
                background: #1e293b;
                color: #4ade80;
                border-color: #334155;
                cursor: not-allowed;
            }

            .converter__badge {
                position: absolute;
                right: 18px;
                font-size: 14px;
                font-weight: 700;
                color: #64748b;
                pointer-events: none;
                user-select: none;
            }

            .converter__btn {
                width: 100%;
                background: #166534;
                color: #4ade80;
                border: none;
                border-radius: 12px;
                font-size: 18px;
                font-weight: 700;
                padding: 16px;
                cursor: pointer;
                box-shadow: 0 4px 0 #14532d;
                transition: background-color 0.15s, transform 0.05s, box-shadow 0.05s;
                margin-top: 10px;
                user-select: none;
            }

            .converter__btn:hover {
                background: #15803d;
            }

            .converter__btn:active {
                transform: translateY(4px);
                box-shadow: none;
            }

            .converter__divider {
                border: 0;
                height: 1px;
                background: #334155;
                margin: 24px 0;
            }
        </style>
    </head>
    <body>

        <div class="converter">
            <div class="converter__container">
                <div class="converter__app">
                    <h2 class="converter__title">Конвертер валют</h2>
                    <div class="converter__group">
                        <label class="converter__label">Сума в гривнях:</label>
                        <div class="converter__input-wrapper">
                            <input type="number"
                                class="converter__input converter__input--uah"
                                value="0"
                                min="0">
                            <span class="converter__badge">UAH</span>
                        </div>
                    </div>
                    <button class="converter__btn">Конвертувати</button>
                    <hr class="converter__divider">
                    <div class="converter__group">
                        <label class="converter__label">Сума в євро:</label>
                        <div class="converter__input-wrapper">
                            <input type="text"
                                class="converter__input converter__input--readonly converter__input--eur"
                                value="0" readonly>
                            <span class="converter__badge"
                                style="color: #4ade80;">EUR</span>
                        </div>
                    </div>
                    <div class="converter__group">
                        <label class="converter__label">Сума в доларах:</label>
                        <div class="converter__input-wrapper">
                            <input type="text"
                                class="converter__input converter__input--readonly converter__input--usd"
                                value="0" readonly>
                            <span class="converter__badge"
                                style="color: #4ade80;">USD</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Глобальні константи для курсів валют
            const EUR_RATE = 45.20; 
            const USD_RATE = 41.50;

            // Обчислення суми та виведення результатів на екран
            function convertCurrency(inputUah, inputEur, inputUsd) {
                if (inputUah && inputEur && inputUsd) {
                    const uahValue = parseFloat(inputUah.value);
                    
                    if (!isNaN(uahValue) && uahValue >= 0) {
                        const resultEur = uahValue / EUR_RATE;
                        const resultUsd = uahValue / USD_RATE;

                        inputEur.value = parseFloat(resultEur.toFixed(2)).toString();
                        inputUsd.value = parseFloat(resultUsd.toFixed(2)).toString();
                    } else {
                        inputEur.value = "0";
                        inputUsd.value = "0";
                    }
                } else {
                    return;
                }
            }

            window.onload = function() {
                const inputUah = document.querySelector('.converter__input--uah');
                const inputEur = document.querySelector('.converter__input--eur');
                const inputUsd = document.querySelector('.converter__input--usd');

                if (inputUah && inputEur && inputUsd) {
                    window.addEventListener('click', function(e) {
                        const targetBtn = e.target;
                        if (targetBtn.classList.contains('converter__btn')) {
                            convertCurrency(inputUah, inputEur, inputUsd);
                        } else {
                            return;
                        }
                    });
                } else {
                    return;
                }
            };
        </script>
    </body>
</html>
