<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Задача 0</title>
    </head>
    <body>
        <h1>Задача 0</h1>
        <div>
            <p>Створити функцію, яка за номером місяця повертає пору року, до
                якої відноситься цей місяць.</p>
        </div>
        <script>
            function getSeason(monthNum) {
                switch (monthNum) {
                    case 12: 
                    case 1: 
                    case 2: 
                        return "Зима ❄️";
                    case 3: 
                    case 4: 
                    case 5: 
                        return "Весна 🌱";
                    case 6: 
                    case 7: 
                    case 8: 
                        return "Літо ☀️";
                    case 9: 
                    case 10: 
                    case 11: 
                        return "Осінь 🍂";
                    default: 
                        return null; 
                }
            }

            if (confirm('Почати тестування?')) {
                const monthNum = parseInt(prompt('Введіть номер місяця (1-12):', '1'));

                if (isNaN(monthNum))
                    alert("Ви не ввели число!");
                else {
                    const season = getSeason(monthNum);

                    if (season) 
                        document.write(`<h2>Номеру місяця ${monthNum} відповідає така пора року: ${season}</h2>`);
                    else
                        alert("Такого номеру місяця не існує!");
                }
            }
        </script>
    </body>
</html>
