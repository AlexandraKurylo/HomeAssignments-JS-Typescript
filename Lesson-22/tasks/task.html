<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/reset.css">
        <title>Лекційний Практикум: Регулярні Вирази (Функції)</title>
        <style>

            .task {
                font-family: 'Montserrat', sans-serif;
                background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
                color: #f1f5f9;
                padding: 40px 20px;
                min-height: 100vh;
            }

            .task__container {
                max-width: 900px;
                margin: 0 auto;
            }

            .header {
                text-align: center;
                margin-bottom: 40px;
            }

            .header__title {
                font-size: 26px;
                font-weight: 800;
                color: #38bdf8;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .task-card {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 16px;
                padding: 24px;
                margin-bottom: 20px;
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            }

            .task-card__title {
                font-size: 16px;
                font-weight: 700;
                color: #f59e0b;
                margin-bottom: 12px;
            }

            .task-card__data {
                background: #0f172a;
                border-radius: 8px;
                padding: 12px 16px;
                font-size: 13px;
                color: #cbd5e1;
                margin-bottom: 12px;
                border-left: 4px solid #64748b;
                word-break: break-all;
            }

            .task-card__output {
                background: rgba(56, 189, 248, 0.05);
                border: 1px dashed rgba(56, 189, 248, 0.3);
                border-radius: 8px;
                padding: 12px 16px;
                font-size: 14px;
                font-weight: 600;
                color: #38bdf8;
                word-break: break-all;
            }

            .task-card__output--empty {
                color: #ef4444;
                border-color: rgba(239, 68, 68, 0.3);
                background: rgba(239, 68, 68, 0.05);
            }
        </style>
    </head>
    <body>

        <div class="task">
            <div class="task__container">
                <header class="header">
                    <h1 class="header__title">RegExp</h1>
                </header>
                <main id="tasksContainer"></main>
            </div>
        </div>
        <script src="../js/task.js"></script>
    </body>
</html>
