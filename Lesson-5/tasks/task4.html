<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Завдання 4</title>
    </head>
    <body>
        <h1>
            Задача 13
        </h1>
        <p> Морський бій. Комп’ютер випадково розташовує одиночний корабель на
            полі розміром N*M. Маючи К снарядів користувач намагається потопити
            корабель.
        </p>

        <script>
            if (confirm('Почати тестування?')) {
                let rows = parseInt(prompt("Введіть кількість рядків поля (N):"));
                let cols = parseInt(prompt("Введіть кількість стовпців поля (M):"));
                let shots = parseInt(prompt("Введіть кількість снарядів (K):"));

                let shipX = Math.floor(Math.random() * rows) + 1; 
                let shipY = Math.floor(Math.random() * cols) + 1; 

                document.write(`<h3>Гра 'Морський бій'</h3>`);
                document.write(`Поле: ${rows} x ${cols}. Снарядів: ${shots}<br>`);
                let isHit = false; 

                while (shots > 0 && !isHit) {
                    let userX = parseInt(prompt(`Ваш постріл! Введіть номер рядка (1 - ${rows}):`));
                    let userY = parseInt(prompt(`Введіть номер стовпця (1 - ${cols}):`));

                    if (userX === shipX && userY === shipY) {
                        isHit = true;
                        document.write(`<b style='color: green;'> Влучання! Корабель потоплено!</b><br>`);
                    } else {
                        shots--; 
                        document.write(`Промах по координатах (${userX }, ${userY}). `);
                        document.write(`Залишилося снарядів: <b>${shots}</b><br>`);
                        if (shots > 0) {
                            alert(`Промах! Спробуйте ще раз. Залишилося снарядів: ${shots}`);
                        }
                    }
                }

                if (isHit) {
                    document.write(`<h2>Перемога! Корабель збито. </h2>`);
                } else {
                    document.write(`<h2 style='color: red;'>Гра закінена. Снаряди вичерпано.</h2>`);
                    document.write(`Корабель був захований тут: рядок ${shipX}, стовпець ${shipY}`);
                }
            }
        </script>
    </body>
</html>
