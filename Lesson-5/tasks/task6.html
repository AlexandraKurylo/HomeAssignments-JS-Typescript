    <body>
        <h1>Задача 15
        </h1>
        <p> Користувача поступово вводить показники температури протягом року.
            Знайти середню температуру.</p>

        <script>
            if (confirm('Почати тестування?')) {
                // Через do-while
                let month = 1;
                let tempSum = 0;
                
                document.write("<h2>Аналіз температури за рік</h2>");

                do {
                    const temp = parseFloat(prompt(`Введіть середню температуру за ${month} місяць:`));
                    tempSum += temp;
                    document.write(`Місяць ${month}: ${temp} °C<br>`);
                    month++;
                } while (month <= 12);

                const averageTemp = tempSum / 12;
                document.write(`<hr><h3>Середня температура за рік: ${averageTemp.toFixed(1)} °C</h3>`);
