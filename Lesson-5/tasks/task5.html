<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Завдання 5</title>
    </head>
    <body>
        <h1>
            Задача 14
        </h1>
        <p>Каса. Користувачу повідомляють суму, яку йому треба сплатити.
            Користувач поступово вводить суму грошей до тих пір, поки суми не
            буде достатньо для оплати товарів (кожного разу користувачу
            повідомляють, яку ще суму потрібно ввести). </p>

        <script>
            if (confirm('Почати тестування?')) {
                let totalSum = parseFloat(prompt("Яка загальна сума до сплати?"));
                let paidSum = 0;

                document.write(`Загальна сума до сплати: <b>${totalSum} грн</b><br><hr>`);

                do {
                    let remaining = totalSum - paidSum;
                    let money = parseFloat(prompt(`Залишилося внести: ${remaining} грн. Введіть суму:`));
                    paidSum += money;
                    document.write(`Внесено: ${money} грн. (Всього: ${paidSum} грн)<br>`);
                } while (paidSum < totalSum);

                let change = paidSum - totalSum;

                document.write("<h3 style='color: green;'>Оплата успішна! Дякуємо!</h3>");

                if (change > 0) {
                    document.write(`Ваша решта: <b>${change.toFixed(2)} грн</b>`);
                }
            }
        </script>
    </body>
</html>
