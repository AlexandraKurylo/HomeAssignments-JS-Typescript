<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/reset.css">
        <title>Задача 4 - Інтерактивні таблиці</title>
        <style>
            .task-card {
                font-family: 'Montserrat', sans-serif;
                background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
                color: #f1f5f9;
            }

            .task-card__container {
                max-width: 1240px;
                min-height: 100vh;
                margin: 0 auto;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 40px 20px;
            }

            .task-card__main {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 24px;
                padding: 35px;
                width: 100%;
                max-width: 700px;
                box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
            }

            .task-card__title {
                font-size: 22px;
                font-weight: 800;
                color: #38bdf8;
                text-align: center;
                margin-bottom: 10px;
            }

            .task-card__description {
                font-size: 14px;
                color: #94a3b8;
                text-align: center;
                margin-bottom: 25px;
                line-height: 1.5;
            }

            .task-card__error-message {
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid #ef4444;
                color: #fca5a5;
                border-radius: 12px;
                padding: 12px 16px;
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 20px;
                display: none;
                text-align: center;
            }

            .task-card__tables-wrapper {
                display: flex;
                flex-direction: column;
                gap: 30px;
            }

            .table-group {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .table-group__title {
                font-size: 16px;
                font-weight: 700;
                color: #94a3b8;
                transition: color 0.3s ease;
            }

            .random-table {
                width: 100%;
                border-collapse: separate;
                border-spacing: 6px;
                background: #0f172a;
                border: 2px solid #334155;
                border-radius: 14px;
                padding: 6px;
                transition: border-color 0.3s ease, box-shadow 0.3s ease;
            }

            .random-table--active {
                border-color: #ef4444;
                box-shadow: 0 0 15px rgba(239, 68, 68, 0.25);
            }

            .random-table__cell {
                background: #1e293b;
                border: 1px solid #334155;
                color: #f1f5f9;
                text-align: center;
                padding: 15px;
                font-size: 16px;
                font-weight: 700;
                border-radius: 8px;
                cursor: pointer;
                width: 33.33%;
                transition: background-color 0.2s ease, transform 0.1s ease;
            }

            .random-table__cell:hover {
                background: #334155;
                color: #38bdf8;
                transform: scale(1.02);
            }
    </style>
    </head>
    <body>

        <div class="task-card">
            <div class="task-card__container">
                <div class="task-card__main">
                    <h2 class="task-card__title">Задача 4</h2>
                    <p class="task-card__description">Дано 3 таблиці розмірності
                        3*3 з випадковими числами. Якщо відбувається клік на
                        якійсь із клітинок, то до відповідної таблиці додається
                        червона рамка (спробуйте додати можливість відображення
                        кількості кліків біля назви таблиці з використанням
                        відповідно доданого для цього атрибута).
                    </p>
                    <div class="task-card__error-message" id="errorBlock"></div>
                    <div class="task-card__tables-wrapper"
                        id="tablesWrapper"></div>
                </div>
            </div>
        </div>

        <script>
        // 1. Генерація випадкового числа
        function getRandomNumber(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // 2. Створення однієї таблиці 3x3 
        function createTableStructure(tableIndex) {
            const groupDiv = document.createElement('div');
            groupDiv.classList.add('table-group');

            const title = document.createElement('h3');
            title.classList.add('table-group__title');
            title.id = `tableTitle-${tableIndex}`;
            title.innerText = `Таблиця №${tableIndex} (Кліків: 0)`;
            groupDiv.appendChild(title);

            const table = document.createElement('table');
            table.classList.add('random-table');
            
            table.setAttribute('data-clicks', '0');
            table.setAttribute('data-index', tableIndex);

            for (let r = 0; r < 3; r++) {
                const tr = document.createElement('tr');
                for (let c = 0; c < 3; c++) {
                    const td = document.createElement('td');
                    td.classList.add('random-table__cell');
                    td.innerText = getRandomNumber(1, 100);
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }

            groupDiv.appendChild(table);
            return groupDiv;
        }

        function generateTables(container) {
            if (container) {
                container.innerHTML = ''; 
                for (let i = 1; i <= 3; i++) {
                    const tableGroup = createTableStructure(i);
                    container.appendChild(tableGroup);
                }
            } else {
                throw new Error("Батьківський контейнер для таблиць відсутній у DOM.");
            }
        }

        function handleTableClick(e, container) {
            const clickedElement = e.target;
            if (clickedElement.tagName === 'TD' && clickedElement.classList.contains('random-table__cell')) {
                const currentTable = clickedElement.closest('.random-table');

                if (currentTable) {
                    container.querySelectorAll('.random-table').forEach(table => {
                        table.classList.remove('random-table--active');
                    });

                    currentTable.classList.add('random-table--active');

                    let clicks = parseInt(currentTable.getAttribute('data-clicks'), 10);
                    
                    if (!isNaN(clicks)) {
                        clicks += 1;
                        currentTable.setAttribute('data-clicks', clicks);

                        const tableIndex = currentTable.getAttribute('data-index');
                        const titleElement = document.getElementById(`tableTitle-${tableIndex}`);
                        
                        if (titleElement) {
                            titleElement.innerText = `Таблиця №${tableIndex} (Кліків: ${clicks})`;
                            titleElement.style.color = '#ef4444';
                        } else {
                            throw new Error(`Не знайдено заголовок для таблиці №${tableIndex}.`);
                        }
                    } else {
                        throw new Error("Атрибут data-clicks пошкоджено або він не є числом.");
                    }
                } else {
                    throw new Error("Клітинка знаходиться поза межами валідної таблиці.");
                }
            }
        }

        window.onload = function() {
            const tablesWrapper = document.getElementById('tablesWrapper');
            const errorBlock = document.getElementById('errorBlock');

            try {
                if (errorBlock) {
                    errorBlock.innerText = '';
                    errorBlock.style.display = 'none';
                } else {
                    throw new Error("Елемент #errorBlock відсутній у розмітці сторінки.");
                }

                if (tablesWrapper) {
                    generateTables(tablesWrapper);
                    tablesWrapper.addEventListener('click', function(e) {
                        try {
                            handleTableClick(e, tablesWrapper);
                        } catch (clickError) {
                            if (errorBlock) {
                                errorBlock.innerText = clickError.message;
                                errorBlock.style.display = 'block';
                            } else {
                                throw clickError;
                            }
                        }
                    });
                } else {
                    throw new Error("Елемент #tablesWrapper не знайдено на сторінці.");
                }

            } catch (initError) {
                if (errorBlock) {
                    errorBlock.innerText = initError.message;
                    errorBlock.style.display = 'block';
                } else {
                    throw initError;
                }
            }
        };
    </script>
    </body>
</html>
