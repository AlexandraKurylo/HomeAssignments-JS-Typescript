<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="../css/reset.css">
        <title>Задача 3 - Випадкові списки</title>
        <style>
            .task-card {
                font-family: 'Montserrat', sans-serif;
                background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
                color: #f1f5f9;

            }

            .task-card__container {
                max-width: 1240px;
                min-height: 100vh;
                margin: 0 auto;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 40px 20px;
            }

            .task-card__main {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 24px;
                padding: 35px;
                width: 100%;
                max-width: 600px;
                box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
            }

            .task-card__title {
                font-size: 22px;
                font-weight: 800;
                color: #38bdf8;
                text-align: center;
                margin-bottom: 10px;
            }

            .task-card__description {
                font-size: 14px;
                color: #94a3b8;
                text-align: center;
                margin-bottom: 25px;
                line-height: 1.5;
            }

            .task-card__error-message {
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid #ef4444;
                color: #fca5a5;
                border-radius: 12px;
                padding: 12px 16px;
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 20px;
                display: none;
                text-align: center;
            }

            .task-card__lists-container {
                display: flex;
                flex-direction: column;
                gap: 20px;
                margin-bottom: 30px;
            }

            .number-list {
                background: #0f172a;
                border: 1px solid #334155;
                border-radius: 14px;
                padding: 15px 15px 15px 40px;
                transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease;
            }

            .number-list--even {
                background: rgba(34, 197, 94, 0.1);
                border-color: #22c55e;
                color: #4ade80;
            }

            .number-list--odd {
                background: rgba(239, 68, 68, 0.1);
                border-color: #ef4444;
                color: #fca5a5;
            }

            .number-list__item {
                font-size: 15px;
                font-weight: 600;
                padding: 3px 0;
            }

            .action-button {
                display: block;
                width: 100%;
                background: #38bdf8;
                color: #0f172a;
                border: none;
                border-radius: 12px;
                padding: 14px;
                font-family: 'Montserrat', sans-serif;
                font-size: 16px;
                font-weight: 700;
                cursor: pointer;
                transition: background-color 0.2s ease, transform 0.1s ease;
                text-align: center;
            }

            .action-button:hover {
                background: #7dd3fc;
            }

            .action-button:active {
                transform: scale(0.98);
            }
    </style>
    </head>
    <body>

        <div class="task-card">
            <div class="task-card__container">
                <div class="task-card__main">
                    <h2 class="task-card__title">Задача 3</h2>
                    <p class="task-card__description">Генерація 5 списків із
                        випадковою
                        кількістю елементів (1-10) та числами (1-100). Кнопка
                        фарбує
                        парні у зелений, непарні — у червоний.</p>
                    <div class="task-card__error-message" id="errorBlock"></div>
                    <div class="task-card__lists-container"
                        id="listsContainer"></div>
                    <button class="action-button" id="btnPaint">Розфарбувати
                        списки</button>
                </div>
            </div>
        </div>

        <script>
            // 1. генерація випадкового числа в діапазоні [min, max]
            function getRandomNumber(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            // 2. Створення та наповнення одного списку (ol) випадковими числами
            function createRandomList() {
                const ol = document.createElement('ol');
                ol.classList.add('number-list');

                const itemsCount = getRandomNumber(1, 10);

                for (let i = 0; i < itemsCount; i++) {
                    const li = document.createElement('li');
                    li.classList.add('number-list__item');
                    li.innerText = getRandomNumber(1, 100);
                    ol.appendChild(li);
                }

                return ol;
            }

            // 3. Генерація заданої кількості списків у контейнері
            function generateAllLists(container, count) {
                if (container) {
                    container.innerHTML = '';

                    for (let i = 0; i < count; i++) {
                        const newList = createRandomList();
                        container.appendChild(newList);
                    }
                } else {
                    throw new Error("Критична помилка: Контейнер для генерації списків не знайдено в DOM.");
                }
            }

            // 4. Розфарбовування списків
            function paintLists(container) {
                if (container) {
                    const lists = container.querySelectorAll('.number-list');

                    lists.forEach(ol => {
                        const elementsCount = ol.children.length;
                        ol.classList.remove('number-list--even', 'number-list--odd');

                        if (elementsCount % 2 === 0) {
                            ol.classList.add('number-list--even'); // Парна кількість - Зелений
                        } else {
                            ol.classList.add('number-list--odd');  // Непарна кількість - Червоний
                        }
                    });
                } else {
                    throw new Error("Помилка розфарбовування");
                }
            }

            window.onload = function() {
                const listsContainer = document.getElementById('listsContainer');
                const btnPaint = document.getElementById('btnPaint');
                const errorBlock = document.getElementById('errorBlock');

                try {
                    if (errorBlock) {
                        errorBlock.innerText = '';
                        errorBlock.style.display = 'none';
                    } else {
                        throw new Error("Критична помилка архітектури: На сторінці відсутній елемент #errorBlock для виведення повідомлень.");
                    }

                    if (listsContainer) {
                        generateAllLists(listsContainer, 5);
                    } else {
                        throw new Error("Критична помилка: Елемент #listsContainer відсутній у розмітці сторінки.");
                    }

                    if (btnPaint) {
                        btnPaint.addEventListener('click', function() {
                            try {
                                paintLists(listsContainer);
                            } catch (clickError) {
                                if (errorBlock) {
                                    errorBlock.innerText = clickError.message;
                                    errorBlock.style.display = 'block';
                                } else {
                                    throw clickError;
                                }
                            }
                        });
                    } else {
                        throw new Error("Критична помилка: Кнопку #btnPaint не знайдено на сторінці.");
                    }

                } catch (initError) {
                    if (errorBlock && initError.message !== "Критична помилка архітектури: На сторінці відсутній елемент #errorBlock для виведення повідомлень.") {
                        errorBlock.innerText = initError.message;
                        errorBlock.style.display = 'block';
                    } else {
                        throw initError;
                    }
                }
            };
        </script>
    </body>
</html>
